# This is a Kconfig fragment which can be used to enable debug-related options
# in the application. See the README for more details.

# compiler
CONFIG_DEBUG_OPTIMIZATIONS=y

# console
CONFIG_CONSOLE=y

# UART console
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# logging
#CONFIG_LOG=y
#CONFIG_APP_LOG_LEVEL_DBG=y

# Post-mortem visibility for the USB-streaming reset investigation.
# These are intentionally OFF in prj.conf to save RAM (~99% on prod build);
# the debug image trades that headroom for diagnostics.
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=60
CONFIG_INIT_STACKS=y
CONFIG_EXTRA_EXCEPTION_INFO=y
