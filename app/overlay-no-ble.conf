# Diagnostic overlay: disable the entire Bluetooth subsystem.
#
# Pairs with make_minimal.sh to isolate whether the BLE stack (host or
# controller cooperative threads) is the source of the multi-thread freeze
# the SW WDT keeps catching. Setting CONFIG_BT=n disables all dependent
# CONFIG_BT_* options automatically via Kconfig dependencies; setting
# CONFIG_HEALTHYPI_BLE_ENABLED=n drops ble_module.c from the build and
# routes app code through ble_stubs.c instead.

CONFIG_HEALTHYPI_BLE_ENABLED=n
CONFIG_BT=n
